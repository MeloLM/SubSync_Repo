services:
  db:
    image: postgres:15-alpine
    container_name: subsync_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: subsync
      POSTGRES_PASSWORD: subsync_password
      POSTGRES_DB: subsync_db
    ports:
      - "5432:5432"
    volumes:
      - subsync_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U subsync -d subsync_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  subsync_pgdata:
